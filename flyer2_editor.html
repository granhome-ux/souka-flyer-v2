<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<title>空花チラシメーカー β (Editor)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
<style>
  @font-face {
    font-family: 'RiiCookieR';
    src: url('fonts/RiiCookieR.woff2') format('woff2'),
         url('fonts/RiiCookieR.woff') format('woff'),
         url('fonts/RiiCookieR.ttf') format('truetype'),
         url('fonts/RiiCookieR.otf') format('opentype');
    font-display: swap;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#f4f0e8;min-height:100vh}
  .header{background:linear-gradient(135deg,#5a3e1b,#8b6914);color:#fff;padding:12px 16px}
  .header h1{font-size:17px;font-weight:900}
  .header p{font-size:10px;opacity:.8}
  .tabs{display:flex;background:#fff;border-bottom:2px solid #e8e2d8;position:sticky;top:0;z-index:10}
  .tabs button{flex:1;padding:10px 0;border:none;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;background:#fff;color:#aaa;border-bottom:3px solid transparent}
  .tabs button.active{background:#faf8f4;color:#5a3e1b;border-bottom-color:#8b6914}
  .panel{display:none}
  .panel.active{display:block}
  .placeholder{background:#fff7e0;border:1px dashed #c4a265;border-radius:10px;padding:40px 16px;text-align:center;color:#8b6914;font-size:15px;font-weight:700;margin:32px auto;max-width:600px}
  .save-area{padding:16px}
  .save-area .box{background:#fff;border-radius:10px;padding:16px;margin:0 auto 12px;box-shadow:0 1px 4px rgba(0,0,0,.06);max-width:600px}
  .save-area .box h3{font-size:15px;font-weight:900;color:#5a3e1b;margin-bottom:8px}
  .save-area .box p{font-size:12px;color:#888;margin-bottom:10px;line-height:1.6}
  .btn{border:none;border-radius:8px;padding:14px 0;width:100%;font-size:15px;font-weight:700;cursor:pointer;color:#fff;font-family:inherit}
  .btn-save{background:#27ae60}
  .btn-load{background:#3498db}
  .btn-reset{background:#e74c3c}
  /* ===== セクター編集フォーム（入力タブ） ===== */
  .sec-edit{padding:16px;max-width:720px;margin:0 auto}
  .sec-edit fieldset{border:2px solid #c4a265;border-radius:10px;padding:14px 16px 16px;margin-bottom:12px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .sec-edit legend{font-size:13px;font-weight:900;color:#5a3e1b;padding:2px 10px;background:#faf8f4;border:1px solid #c4a265;border-radius:4px}
  .sec-edit label{display:block;margin:10px 0 0;font-size:12px;color:#5a3e1b;font-weight:700}
  .sec-edit input[type="text"],.sec-edit input[type="number"],.sec-edit select{width:100%;padding:7px 9px;font-size:14px;border:1px solid #ddd;border-radius:6px;font-family:inherit;margin-top:4px;box-sizing:border-box;background:#fff}
  .sec-edit input:focus,.sec-edit select:focus{outline:none;border-color:#8b6914;box-shadow:0 0 0 2px #c4a26540}
  .sec-edit .row{display:flex;gap:8px}
  .sec-edit .row label{margin:10px 0 0}
  .sec-edit .preview-thumb{width:100px;height:100px;object-fit:contain;border:1px solid #ddd;border-radius:6px;background:#faf8f4;margin-top:10px;display:block;padding:4px}
  .sec-edit hr{border:none;border-top:1px dashed #c4a26580;margin:16px 0 8px}
  .sec-edit .sub-input{display:none}
  .sec-edit .sub-input.show{display:block}
  /* ===== チラシプレビュー（確認タブ） ===== */
  .preview-area{padding:12px;background:#333;min-height:calc(100vh - 110px)}
  .preview-area .hint{font-size:11px;color:#ccc;text-align:center;margin-bottom:8px}
  .flyer-wrap{
    width:100%;
    max-width:1400px;
    aspect-ratio:1754/1240;
    margin:0 auto;
    position:relative;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
    font-family:'RiiCookieR',sans-serif;
    background:#fff;
  }
  .flyer{position:absolute;inset:0;background:url('images/bg/bg_a4.png') center/cover no-repeat}
  .frame-svg,.content-svg{position:absolute;inset:0;width:100%;height:100%}
  .content-svg{pointer-events:none}

<body>
<div class="header">
  <h1>🌿 空花チラシメーカー（β）</h1>
  <p>Editor - 2ページ目プロトタイプ / タブ骨格版</p>
</div>
<div class="tabs" id="tabs">
  <button data-tab="edit" class="active">✏️ 入力</button>
  <button data-tab="preview">👁 確認</button>
  <button data-tab="print">🖨 印刷</button>
  <button data-tab="save">💾 保存</button>
</div>

<!-- ========== 入力タブ ========== -->
<div class="panel active" data-panel="edit">
  <div class="sec-edit">
    <fieldset>
      <legend>セクター① 左上・目玉商品</legend>

      <label>T1 大見出し（6字まで）
        <input type="text" id="s1-f-headline" maxlength="6" placeholder="大人気！">
      </label>

      <label>T2 産地（8字まで）
        <input type="text" id="s1-f-origin" maxlength="8" placeholder="熊本産">
      </label>

      <div class="row">
        <label style="flex:1">T3A 商品名（7字まで）
          <input type="text" id="s1-f-name" maxlength="7" placeholder="スイカ">
        </label>
        <label style="flex:1">T3B 産地補足
          <input type="text" id="s1-f-note" placeholder="熊本">
        </label>
      </div>

      <div class="row">
        <label style="flex:1">T4a 個数（3桁）
          <input type="number" id="s1-f-qtynum" min="0" max="999" placeholder="1">
        </label>
        <label style="flex:1">T4b 個数単位
          <select id="s1-f-qtyunit">
            <option value="玉">玉</option>
            <option value="個">個</option>
            <option value="袋">袋</option>
            <option value="本">本</option>
            <option value="パック">パック</option>
            <option value="箱">箱</option>
            <option value="房">房</option>
            <option value="束">束</option>
            <option value="">なし</option>
            <option value="__custom__">自由入力…</option>
          </select>
        </label>
      </div>
      <label class="sub-input" id="s1-f-qtyunit-custom-wrap">（自由入力）
        <input type="text" id="s1-f-qtyunit-custom" placeholder="単位を入力">
      </label>

      <div class="row">
        <label style="flex:1">T4c 値段（6桁）
          <input type="number" id="s1-f-pricenum" min="0" max="999999" placeholder="2000">
        </label>
        <label style="flex:1">T4d 通貨単位
          <select id="s1-f-currency">
            <option value="円">円</option>
            <option value="g">g</option>
            <option value="kg">kg</option>
            <option value="">なし</option>
            <option value="__custom__">自由入力…</option>
          </select>
        </label>
      </div>
      <label class="sub-input" id="s1-f-currency-custom-wrap">（自由入力）
        <input type="text" id="s1-f-currency-custom" placeholder="通貨単位を入力">
      </label>

      <hr>
      <label>I1 メイン画像</label>
      <div class="row">
        <select id="s1-f-img-cat" style="flex:1"></select>
        <select id="s1-f-img-sub" style="flex:1"></select>
        <select id="s1-f-img-item" style="flex:2"></select>
      </div>
      <img id="s1-f-img-preview" class="preview-thumb" alt="画像プレビュー">
    </fieldset>
  </div>
</div>

<script>
// ===== タブ切替 =====
(function(){
  var btns = document.querySelectorAll('.tabs button');
  var pans = document.querySelectorAll('.panel');
  for (var i = 0; i < btns.length; i++) {
    btns[i].addEventListener('click', function(e){
      var t = this.getAttribute('data-tab');
      for (var j = 0; j < btns.length; j++) btns[j].classList.toggle('active', btns[j] === this);
      for (var k = 0; k < pans.length; k++) pans[k].classList.toggle('active', pans[k].getAttribute('data-panel') === t);
      if (t === 'preview') setTimeout(function(){ updateT3BPosition(); updateCurrencyPosition(); }, 50);
    });
  }
})();

// ===== ストレージキー =====
var STORAGE_KEY = 'souka_flyer_v2_data';

// ===== 画像ライブラリ読込 =====
var IMAGE_LIB = null;
try {
  IMAGE_LIB = JSON.parse(document.getElementById('imageLibrary').textContent);
} catch(e) {
  console.error('Failed to parse image library', e);
}

// ===== セクター① 状態 =====
var SEC1_DEFAULT = {
  t1_headline: '大人気！',
  t2_origin: '熊本産',
  t3a_name: 'スイカ',
  t3b_note: '熊本',
  t4a_qty_num: 1,
  t4b_qty_unit: '玉',
  t4c_price_num: 2000,
  t4d_currency: '円',
  i1_image: 'suika.png'
};
var S1 = Object.assign({}, SEC1_DEFAULT);

var QTY_UNITS = ['玉','個','袋','本','パック','箱','房','束'];
var CURRENCY_UNITS = ['円','g','kg'];

function $id(id){ return document.getElementById(id); }

// ===== 画像カスケードドロップダウン =====
function populateImageCategorySelect() {
  if (!IMAGE_LIB) return;
  var sel = $id('s1-f-img-cat');
  sel.innerHTML = '';
  for (var ck in IMAGE_LIB.categories) {
    var c = IMAGE_LIB.categories[ck];
    var opt = document.createElement('option');
    opt.value = ck;
    opt.textContent = c.label;
    sel.appendChild(opt);
  }
}
function populateImageSubcategorySelect(catKey) {
  var sel = $id('s1-f-img-sub');
  sel.innerHTML = '';
  if (!IMAGE_LIB) return;
  var c = IMAGE_LIB.categories[catKey];
  if (!c) return;
  for (var sk in c.subcategories) {
    var s = c.subcategories[sk];
    var opt = document.createElement('option');
    opt.value = sk;
    opt.textContent = s.label;
    sel.appendChild(opt);
  }
}
function populateImageItemSelect(catKey, subKey) {
  var sel = $id('s1-f-img-item');
  sel.innerHTML = '';
  if (!IMAGE_LIB) return;
  var c = IMAGE_LIB.categories[catKey];
  if (!c) return;
  var s = c.subcategories[subKey];
  if (!s) return;
  for (var i = 0; i < s.items.length; i++) {
    var it = s.items[i];
    var opt = document.createElement('option');
    opt.value = it.file;
    opt.textContent = it.label + ' (' + it.file.replace('.png','') + ')';
    sel.appendChild(opt);
  }
}

function findImageLocation(file) {
  if (!IMAGE_LIB) return null;
  for (var ck in IMAGE_LIB.categories) {
    var c = IMAGE_LIB.categories[ck];
    for (var sk in c.subcategories) {
      var s = c.subcategories[sk];
      for (var i = 0; i < s.items.length; i++) {
        if (s.items[i].file === file) return {cat:ck, sub:sk, file:file};
      }
    }
  }
  return null;
}

function syncImageCascadeToFile(file) {
  var loc = findImageLocation(file);
  if (!loc) return false;
  $id('s1-f-img-cat').value = loc.cat;
  populateImageSubcategorySelect(loc.cat);
  $id('s1-f-img-sub').value = loc.sub;
  populateImageItemSelect(loc.cat, loc.sub);
  $id('s1-f-img-item').value = loc.file;
  $id('s1-f-img-preview').src = 'images/products/' + loc.file;
  return true;
}

// ===== 自由入力欄の表示制御 =====
function updateQtyUnitCustomVisibility() {
  $id('s1-f-qtyunit-custom-wrap').classList.toggle('show', $id('s1-f-qtyunit').value === '__custom__');
}
function updateCurrencyCustomVisibility() {
  $id('s1-f-currency-custom-wrap').classList.toggle('show', $id('s1-f-currency').value === '__custom__');
}

function resolveQtyUnit() {
  var v = $id('s1-f-qtyunit').value;
  return v === '__custom__' ? ($id('s1-f-qtyunit-custom').value || '') : v;
}
function resolveCurrency() {
  var v = $id('s1-f-currency').value;
  return v === '__custom__' ? ($id('s1-f-currency-custom').value || '') : v;
}

// ===== セクター① SVG更新 =====
function updateS1SVG() {
  $id('s1-headline-fill').textContent = S1.t1_headline;
  $id('s1-headline-stroke').textContent = S1.t1_headline;
  $id('s1-origin').textContent = S1.t2_origin;
  $id('s1-name').textContent = S1.t3a_name;
  $id('s1-note').textContent = S1.t3b_note;
  $id('s1-qty').textContent = String(S1.t4a_qty_num) + (S1.t4b_qty_unit || '');
  $id('s1-price-fill').textContent = String(S1.t4c_price_num);
  $id('s1-price-stroke').textContent = String(S1.t4c_price_num);
  $id('s1-currency').textContent = S1.t4d_currency || '';
  $id('s1-main-image').setAttribute('href', 'images/products/' + S1.i1_image);
  updateT3BPosition();
  updateCurrencyPosition();
}

// ===== T3B (産地補足) の x座標をT3A末尾＋半角空きに動的追従 =====
function updateT3BPosition() {
  var t3a = $id('s1-name');
  var t3b = $id('s1-note');
  if (!t3a || !t3b) return;
  var t3aX = 80;
  var fontSize = 80;
  var widthPx = 0;
  try { widthPx = t3a.getComputedTextLength(); } catch(e) {}
  if (!widthPx) { try { widthPx = t3a.getBBox().width; } catch(e) {} }
  if (!widthPx) widthPx = (t3a.textContent || '').length * fontSize;
  var halfSpace = fontSize * 0.3;
  t3b.setAttribute('x', t3aX + widthPx + halfSpace);
}

// ===== T4d (円) の x座標を価格数字の末尾＋半角空きに動的追従 =====
function updateCurrencyPosition() {
  var priceStroke = $id('s1-price-stroke');
  var currency = $id('s1-currency');
  if (!priceStroke || !currency) return;
  var priceX = 180;
  var priceFontSize = 100;
  var widthPx = 0;
  try { widthPx = priceStroke.getComputedTextLength(); } catch(e) {}
  if (!widthPx) { try { widthPx = priceStroke.getBBox().width; } catch(e) {} }
  if (!widthPx) widthPx = (priceStroke.textContent || '').length * priceFontSize * 0.6;
  var halfSpace = priceFontSize * 0.2;
  currency.setAttribute('x', priceX + widthPx + halfSpace);
}

// ===== 状態→フォーム反映 =====
function loadS1FormFromState() {
  $id('s1-f-headline').value = S1.t1_headline;
  $id('s1-f-origin').value = S1.t2_origin;
  $id('s1-f-name').value = S1.t3a_name;
  $id('s1-f-note').value = S1.t3b_note;
  $id('s1-f-qtynum').value = S1.t4a_qty_num;
  if (QTY_UNITS.indexOf(S1.t4b_qty_unit) >= 0 || S1.t4b_qty_unit === '') {
    $id('s1-f-qtyunit').value = S1.t4b_qty_unit;
    $id('s1-f-qtyunit-custom').value = '';
  } else {
    $id('s1-f-qtyunit').value = '__custom__';
    $id('s1-f-qtyunit-custom').value = S1.t4b_qty_unit;
  }
  updateQtyUnitCustomVisibility();

  $id('s1-f-pricenum').value = S1.t4c_price_num;
  if (CURRENCY_UNITS.indexOf(S1.t4d_currency) >= 0 || S1.t4d_currency === '') {
    $id('s1-f-currency').value = S1.t4d_currency;
    $id('s1-f-currency-custom').value = '';
  } else {
    $id('s1-f-currency').value = '__custom__';
    $id('s1-f-currency-custom').value = S1.t4d_currency;
  }
  updateCurrencyCustomVisibility();

  syncImageCascadeToFile(S1.i1_image);
}

// ===== フォーム→状態 反映＋SVG更新 =====
function applyS1FromForm() {
  S1.t1_headline = $id('s1-f-headline').value;
  S1.t2_origin = $id('s1-f-origin').value;
  S1.t3a_name = $id('s1-f-name').value;
  S1.t3b_note = $id('s1-f-note').value;
  S1.t4a_qty_num = parseInt($id('s1-f-qtynum').value, 10);
  if (isNaN(S1.t4a_qty_num)) S1.t4a_qty_num = 0;
  S1.t4b_qty_unit = resolveQtyUnit();
  S1.t4c_price_num = parseInt($id('s1-f-pricenum').value, 10);
  if (isNaN(S1.t4c_price_num)) S1.t4c_price_num = 0;
  S1.t4d_currency = resolveCurrency();
  S1.i1_image = $id('s1-f-img-item').value || S1.i1_image;
  updateS1SVG();
}

// ===== イベントバインド =====
function bindS1Events() {
  var textIds = ['s1-f-headline','s1-f-origin','s1-f-name','s1-f-note','s1-f-qtynum','s1-f-pricenum','s1-f-qtyunit-custom','s1-f-currency-custom'];
  textIds.forEach(function(id){ $id(id).addEventListener('input', applyS1FromForm); });
  $id('s1-f-qtyunit').addEventListener('change', function(){ updateQtyUnitCustomVisibility(); applyS1FromForm(); });
  $id('s1-f-currency').addEventListener('change', function(){ updateCurrencyCustomVisibility(); applyS1FromForm(); });

  $id('s1-f-img-cat').addEventListener('change', function(){
    var cat = this.value;
    populateImageSubcategorySelect(cat);
    var c = IMAGE_LIB.categories[cat];
    var firstSubKey = c ? Object.keys(c.subcategories)[0] : null;
    if (firstSubKey) {
      $id('s1-f-img-sub').value = firstSubKey;
      populateImageItemSelect(cat, firstSubKey);
      var firstItem = c.subcategories[firstSubKey].items[0];
      if (firstItem) {
        $id('s1-f-img-item').value = firstItem.file;
        $id('s1-f-img-preview').src = 'images/products/' + firstItem.file;
      }
    }
    applyS1FromForm();
  });
  $id('s1-f-img-sub').addEventListener('change', function(){
    var cat = $id('s1-f-img-cat').value;
    populateImageItemSelect(cat, this.value);
    var s = IMAGE_LIB.categories[cat].subcategories[this.value];
    var firstItem = s ? s.items[0] : null;
    if (firstItem) {
      $id('s1-f-img-item').value = firstItem.file;
      $id('s1-f-img-preview').src = 'images/products/' + firstItem.file;
    }
    applyS1FromForm();
  });
  $id('s1-f-img-item').addEventListener('change', function(){
    $id('s1-f-img-preview').src = 'images/products/' + this.value;
    applyS1FromForm();
  });
}

// ===== localStorage 保存/読込/リセット =====
function doSave(){
  var data = {
    version: "1.0",
    sectors: { s1: Object.assign({}, S1) }
  };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    alert('保存しました (key: ' + STORAGE_KEY + ')\n\n' + JSON.stringify(data, null, 2));
  } catch(e) {
    alert('保存失敗: ' + e.message);
  }
}

function doLoad(){
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw === null) { alert('保存データがありません (key: ' + STORAGE_KEY + ')'); return; }
    var data = JSON.parse(raw);
    if (data && data.sectors && data.sectors.s1) {
      var s1 = data.sectors.s1;
      for (var k in SEC1_DEFAULT) { if (k in s1) S1[k] = s1[k]; }
      loadS1FormFromState();
      updateS1SVG();
      alert('読み込みました (key: ' + STORAGE_KEY + ')\n\n' + raw);
    } else {
      alert('保存データに s1 が含まれていません:\n\n' + raw);
    }
  } catch(e) {
    alert('読み込み失敗: ' + e.message);
  }
}

function doReset(){
  if (!confirm('保存データを削除して初期値に戻しますか？ (key: ' + STORAGE_KEY + ')')) return;
  try {
    localStorage.removeItem(STORAGE_KEY);
    for (var k in SEC1_DEFAULT) { S1[k] = SEC1_DEFAULT[k]; }
    loadS1FormFromState();
    updateS1SVG();
    alert('削除して初期値に戻しました');
  } catch(e) {
    alert('削除失敗: ' + e.message);
  }
}

// ===== 初期化 =====
(function initS1(){
  if (!IMAGE_LIB) { console.error('IMAGE_LIB not loaded'); return; }
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var data = JSON.parse(raw);
      if (data && data.sectors && data.sectors.s1) {
        for (var k in SEC1_DEFAULT) { if (k in data.sectors.s1) S1[k] = data.sectors.s1[k]; }
      }
    }
  } catch(e) { /* ignore */ }
  populateImageCategorySelect();
  loadS1FormFromState();
  bindS1Events();
  updateS1SVG();
})();
</script>
