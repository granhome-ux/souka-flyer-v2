/* === buildFlyer1: FLYER1_TPL に D.page1.date / D.page1.time を差し込み（info.html line 143 踏襲） === */
function buildFlyer1(){
  var p=D.page1;
  var d=esc(p.date).replace(/(\d+)(月)(\d+)(日)/,function(_,m,mk,dd,dk){return '<span style="font-size:2em;vertical-align:-0.15em">'+m+'</span>'+mk+'<span style="font-size:2em;vertical-align:-0.15em">'+dd+'</span>'+dk});
  var h=FLYER1_TPL;
  h=h.replace(/__DATE__/g,d);
  h=h.replace(/__TIME__/g,esc(p.time));
  return h;
}

/* === buildEditor1: info.html buildEditor/buildEditor1 踏襲 + 全項目対応 === */
function inp1(id,val,ph,st){return '<input id="'+id+'" value="'+esc(val)+'" placeholder="'+esc(ph)+'" oninput="updP1()" style="'+(st||'')+'">'}
function ePick(prefix,emojis,sel){var h='<div class="ep">';for(var i=0;i<emojis.length;i++)h+='<button class="'+(emojis[i]===sel?'sel':'')+'" onclick="pickEmoji1(\''+prefix+"','"+emojis[i]+'\')">'+emojis[i]+'</button>';return h+'</div>'}
function cardList1(cat,items,emojis,max){
  var h='';
  for(var i=0;i<items.length;i++){
    h+='<div class="card"><div class="top">'+
       '<input id="p1_'+cat+'_e_'+i+'" value="'+esc(items[i].e)+'" oninput="updP1()" style="width:44px;text-align:center">'+
       '<input id="p1_'+cat+'_n_'+i+'" value="'+esc(items[i].n)+'" placeholder="商品名" oninput="updP1()" style="flex:1">'+
       '<button class="del-btn" onclick="delItem1(\''+cat+"',"+i+')">×</button>'+
       '</div><div class="emojis">';
    for(var j=0;j<emojis.length;j++)h+='<button class="'+(items[i].e===emojis[j]?'sel':'')+'" onclick="pickItemEmoji1(\''+cat+"',"+i+",'"+emojis[j]+'\')">'+emojis[j]+'</button>';
    h+='</div><div class="bottom">'+
       '<input id="p1_'+cat+'_u_'+i+'" value="'+esc(items[i].u)+'" placeholder="単位（1袋等）" oninput="updP1()" style="flex:1">'+
       '<input id="p1_'+cat+'_p_'+i+'" value="'+esc(items[i].p)+'" placeholder="価格" oninput="updP1()" style="width:90px">'+
       '</div></div>';
  }
  var full=items.length>=max;
  h+='<button class="add-btn" style="background:'+(full?'#ccc':'#2d6a2e')+'" onclick="addItem1(\''+cat+'\')">'+(full?'最大'+max+'品です':'＋ 追加')+'（'+items.length+'/'+max+'）</button>';
  return h;
}

function updP1(){
  var p=D.page1;
  var el;

  el=document.getElementById('p1_time');if(el)p.time=el.value;
  el=document.getElementById('p1_feat_name');if(el)p.feat.name=el.value;
  el=document.getElementById('p1_feat_origin');if(el)p.feat.origin=el.value;
  el=document.getElementById('p1_feat_unit');if(el)p.feat.unit=el.value;
  el=document.getElementById('p1_feat_price');if(el)p.feat.price=el.value;
  el=document.getElementById('p1_sp_name');if(el)p.special.name=el.value;
  el=document.getElementById('p1_sp_price');if(el)p.special.price=el.value;
  el=document.getElementById('p1_sp_bulk');if(el)p.special.bulkUnit=el.value;
  el=document.getElementById('p1_sp_bulkp');if(el)p.special.bulkPrice=el.value;
  el=document.getElementById('p1_footer');if(el)p.footer=el.value;
  var cats=['veg','fruit','citrus'];
  for(var c=0;c<cats.length;c++){var cat=cats[c];for(var i=0;i<p[cat].length;i++){
    el=document.getElementById('p1_'+cat+'_e_'+i);if(el)p[cat][i].e=el.value;
    el=document.getElementById('p1_'+cat+'_n_'+i);if(el)p[cat][i].n=el.value;
    el=document.getElementById('p1_'+cat+'_u_'+i);if(el)p[cat][i].u=el.value;
    el=document.getElementById('p1_'+cat+'_p_'+i);if(el)p[cat][i].p=el.value;
  }}
  autoSave();updFullPages();
}
function updP1Notes(){var t=document.getElementById('p1_notes').value;D.page1.notes=t.split(/\r?\n/).map(function(x){return x.replace(/^\s+|\s+$/g,'')}).filter(function(x){return x});autoSave()}
function pickEmoji1(prefix,em){if(prefix==='feat')D.page1.feat.emoji=em;else if(prefix==='sp')D.page1.special.emoji=em;autoSave()}
function pickItemEmoji1(cat,idx,em){D.page1[cat][idx].e=em;autoSave();render()}
function delItem1(cat,idx){updP1();D.page1[cat].splice(idx,1);autoSave();render()}
function addItem1(cat){updP1();var max=cat==='veg'?MAX_VEG:cat==='fruit'?MAX_FRUIT:MAX_CITRUS;if(D.page1[cat].length>=max){alert('最大'+max+'品までです');return}var de=cat==='veg'?'🥬':cat==='fruit'?'🍎':'🍊';D.page1[cat].push({e:de,n:'',u:'',p:''});autoSave();render()}

/* === buildFlyer2: 2ページ目 5枠レイアウト === */
function lblHTML(l){return l?'<span class="lbl">'+esc(l)+'</span>':''}
function lblSmHTML(l){return l?'<span class="lb">'+esc(l)+'</span>':''}
function buildFlyer2(){
  var p2=D.page2;
  var b=p2.banner;
  var bannerHTML='<div class="slot banner"><div class="bmain"><img src="images/'+esc(b.e)+'" alt="'+esc(b.n)+'"><div class="binfo">'+
    (b.origin?'<div class="origin">'+esc(b.origin)+'</div>':'')+
    '<div class="n">'+esc(b.n)+'</div>'+
    '<div><span class="unit">'+esc(b.unit)+'</span><span class="price">'+esc(b.price)+'</span></div>'+
    (b.label?'<div class="lbl-wrap">'+lblHTML(b.label)+'</div>':'')+
    '</div></div></div>';
  function listSlot(cls,data){
    var html='<div class="slot '+cls+'"><h4>'+esc(data.title)+'</h4>';
    html+=(data.items||[]).map(function(it){
      return '<div class="item"><img src="images/'+esc(it.e)+'" alt=""><span class="nm">'+esc(it.n)+'</span>'+

/* === 編集パネル（モーダル） === */
function openPanel(html){var bg=document.getElementById('pnlBg');document.getElementById('pnl').innerHTML=html;bg.classList.add('show');bg.onclick=function(ev){if(ev.target===bg)closePanel()};document.addEventListener('keydown',escClose)}
function closePanel(){document.getElementById('pnlBg').classList.remove('show');document.removeEventListener('keydown',escClose)}
function escClose(ev){if(ev.key==='Escape')closePanel()}

function imgGridHTML(selFile){
  var h='<div class="igrid">';
  IMGS.forEach(function(fn){h+='<div class="gi'+(fn===selFile?' sel':'')+'" data-fn="'+esc(fn)+'"><img src="images/'+esc(fn)+'" loading="lazy" alt=""><div class="nm">'+esc(fn.replace(/\.png$/,''))+'</div></div>'});
  h+='</div>';return h;
}
function labelGridHTML(selLabel){
  var h='<div class="lgrid">';
  h+='<button type="button" data-v=""'+(!selLabel?' class="sel"':'')+'>なし</button>';
  LABELS.forEach(function(l){h+='<button type="button" data-v="'+esc(l)+'"'+(l===selLabel?' class="sel"':'')+'>'+esc(l)+'</button>'});
  h+='</div>';return h;
}
function bindGrids(){
  Array.prototype.forEach.call(document.querySelectorAll('.igrid .gi'),function(el){el.onclick=function(){Array.prototype.forEach.call(document.querySelectorAll('.igrid .gi'),function(e2){e2.classList.remove('sel')});el.classList.add('sel')}});
  Array.prototype.forEach.call(document.querySelectorAll('.lgrid button'),function(el){el.onclick=function(){Array.prototype.forEach.call(document.querySelectorAll('.lgrid button'),function(e2){e2.classList.remove('sel')});el.classList.add('sel')}});
}

function openSlotEdit(k){
  if(k==='banner')return openBannerEdit();
  if(k==='notes')return openNotesEdit();
  return openListEdit(k);
}
function openBannerEdit(){
  var d=D.page2.banner;
  var html='<h3>⭐ 看板商品を編集</h3>';
  html+='<label>画像を選択（images/ の101枚から）</label>'+imgGridHTML(d.e);
  html+='<label>商品名</label><input id="_n" value="'+esc(d.n)+'">';
  html+='<label>産地・補足（任意）</label><input id="_origin" value="'+esc(d.origin||'')+'">';
  html+='<label>単位（例: 1玉、1袋(4本入)）</label><input id="_unit" value="'+esc(d.unit)+'">';
  html+='<label>価格（例: 2000円）</label><input id="_price" value="'+esc(d.price)+'">';
  html+='<label>ラベル（14種、または なし）</label>'+labelGridHTML(d.label);
  html+='<div class="acts"><button class="btn-save" type="button" id="_save">保存</button><button class="btn-cancel" type="button" id="_cancel">キャンセル</button></div>';
  openPanel(html);bindGrids();
  document.getElementById('_save').onclick=function(){
    var si=document.querySelector('.igrid .gi.sel');if(si)d.e=si.getAttribute('data-fn');
    d.n=document.getElementById('_n').value;d.origin=document.getElementById('_origin').value;
    d.unit=document.getElementById('_unit').value;d.price=document.getElementById('_price').value;
    var sl=document.querySelector('.lgrid button.sel');if(sl)d.label=sl.getAttribute('data-v');
    save();render();closePanel();
  };
  document.getElementById('_cancel').onclick=closePanel;
}
function openListEdit(k){
  var d=D.page2[k];
  var titleMap={vegList:'🥬 野菜ラインナップ',sale:'🔥 セール商品',recommend:'🍈 おすすめ',category:'🍊 カテゴリ'};
  var html='<h3>'+titleMap[k]+' を編集</h3>';
  html+='<label>セクション見出し</label><input id="_title" value="'+esc(d.title)+'">';
  html+='<div id="_items">'+renderItemEditors(d.items)+'</div>';
  html+='<button type="button" class="btn-add" id="_add">＋ 商品を追加</button>';
  html+='<div class="acts"><button class="btn-save" type="button" id="_save">保存</button><button class="btn-cancel" type="button" id="_cancel">キャンセル</button></div>';
  openPanel(html);
  function capture(){var items=[];Array.prototype.forEach.call(document.querySelectorAll('#_items .ei'),function(el){var i=parseInt(el.getAttribute('data-i'),10);var cur=d.items[i]||{};items.push({e:el.querySelector('[data-f="e"]').value,n:el.querySelector('[data-f="n"]').value,origin:cur.origin||"",unit:el.querySelector('[data-f="unit"]').value,price:el.querySelector('[data-f="price"]').value,label:el.querySelector('[data-f="label"]').value})});return items}
  function bindDel(){Array.prototype.forEach.call(document.querySelectorAll('#_items .btn-del-item'),function(btn){btn.onclick=function(){var i=parseInt(btn.getAttribute('data-i'),10);var cur=capture();cur.splice(i,1);d.items=cur;document.getElementById('_items').innerHTML=renderItemEditors(d.items);bindDel()}})}
  bindDel();
  document.getElementById('_add').onclick=function(){d.items=capture();d.items.push({e:IMGS[0],n:"",origin:"",unit:"",price:"",label:""});document.getElementById('_items').innerHTML=renderItemEditors(d.items);bindDel()};
  document.getElementById('_save').onclick=function(){d.title=document.getElementById('_title').value;d.items=capture();save();render();closePanel()};
  document.getElementById('_cancel').onclick=closePanel;
}
function renderItemEditors(items){
  return items.map(function(it,i){
    var imgOpts=IMGS.map(function(fn){return '<option value="'+esc(fn)+'"'+(fn===it.e?' selected':'')+'>'+esc(fn)+'</option>'}).join('');
    var lblOpts='<option value=""'+(!it.label?' selected':'')+'>（なし）</option>'+LABELS.map(function(l){return '<option value="'+esc(l)+'"'+(l===it.label?' selected':'')+'>'+esc(l)+'</option>'}).join('');
    return '<div class="ei" data-i="'+i+'"><div class="ei-hd"><strong>#'+(i+1)+'</strong><button class="btn-del-item" type="button" data-i="'+i+'">削除</button></div>'+
      '<label>画像</label><select data-f="e">'+imgOpts+'</select>'+
      '<label>商品名</label><input data-f="n" value="'+esc(it.n||'')+'">'+
      '<label>単位（例: 1袋、1玉）</label><input data-f="unit" value="'+esc(it.unit||'')+'">'+
      '<label>価格（例: 100円）</label><input data-f="price" value="'+esc(it.price||'')+'">'+
      '<label>ラベル</label><select data-f="label">'+lblOpts+'</select>'+
      '</div>';
  }).join('');
}
function openNotesEdit(){
  var html='<h3>📝 2ページ目 注意書きを編集（1行1項目）</h3>';
  html+='<textarea id="_notes" style="min-height:160px">'+esc((D.page2.notes||[]).join('\n'))+'</textarea>';
  html+='<div class="acts"><button class="btn-save" type="button" id="_save">保存</button><button class="btn-cancel" type="button" id="_cancel">キャンセル</button></div>';
  openPanel(html);
  document.getElementById('_save').onclick=function(){var t=document.getElementById('_notes').value;D.page2.notes=t.split(/\r?\n/).map(function(x){return x.replace(/^\s+|\s+$/g,'')}).filter(function(x){return x});save();render();closePanel()};
  document.getElementById('_cancel').onclick=closePanel;
}

    '<div class="box"><h3>🔄 データをリセット</h3><p>初期データに戻したい場合はこちら</p><button class="save-btn" style="background:#e74c3c" onclick="resetData()">🗑 初期データに戻す</button></div>'+

    '<div class="box"><h3>💾 データをテキストで書き出す</h3><p>他の端末に渡したい場合（表示テキストをコピーして保存）</p><button class="save-btn" onclick="saveJSON()">📥 データを表示する</button></div>'+
    '<div class="guide"><h3>📋 毎週の手順</h3><p>①「編集」→ 今週の商品・価格に変更<br>②「プレビュー」→ チラシをチェック<br>③「印刷」→ ボタンひとつで印刷！<br><br>※データは自動保存されるので<br>　保存ボタンを押す必要はありません</p></div></div>';
}
function saveJSON(){var t=JSON.stringify(D,null,2);var html="<!DOCTYPE html><html><head><meta charset=UTF-8><title>flyer3 data</title></head><body><pre style=\"white-space:pre-wrap;word-break:break-all\">"+t.replace(/</g,"&lt;")+"</pre></body></html>";var blob=new Blob([html],{type:"text/html"});window.open(URL.createObjectURL(blob))}
function loadJSON(ev){var f=ev.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{D=JSON.parse(e.target.result);save();render();alert('読み込み完了！')}catch(x){alert('読み込めませんでした')}};r.readAsText(f)}
function resetData(){if(confirm('本当に初期データに戻しますか？')){D=deepCopy(DEFAULT_D);save();render()}}

/* === render: pgSw / tabs / content を描画 === */
function setPg(p){pg=p;render()}
function setTab(t){if(t==='print'){doPrint();return}tab=t;render()}
function updFullPages(){document.getElementById('page1Full').innerHTML=buildFlyer1();document.getElementById('page2Full').innerHTML=buildFlyer2()}
function render(){
  document.getElementById('pgSw').innerHTML='<button class="'+(pg==='page1'?'active':'')+'" onclick="setPg(\'page1\')">📄 1ページ目（営業案内）</button><button class="'+(pg==='page2'?'active':'')+'" onclick="setPg(\'page2\')">🍎 2ページ目（商品チラシ）</button>';
  var tabList=[{id:'edit',label:'✏️ 編集'},{id:'preview',label:'👁 プレビュー'},{id:'print',label:'🖨 印刷'},{id:'save',label:'💾 保存'}];
  document.getElementById('tabs').innerHTML=tabList.map(function(t){return '<button class="'+(tab===t.id?'active':'')+'" onclick="setTab(\''+t.id+'\')">'+t.label+'</button>'}).join('');
  var c=document.getElementById('content');
  if(tab==='edit'){c.innerHTML=pg==='page1'?buildEditor1():buildEditor2()}
  else if(tab==='preview'){c.innerHTML='<div class="preview-area"><div class="hint">ピンチで拡大できます</div><div style="width:100%;overflow:auto"><div style="transform:scale(0.34);transform-origin:top left;width:297mm;margin-bottom:calc(-210mm * 0.66)">'+(pg==='page1'?buildFlyer1():buildFlyer2())+'</div></div></div>'}
  else if(tab==='save'){c.innerHTML=buildSave()}
  updFullPages();
}

function doPrint(){updFullPages();setTimeout(function(){window.print()},200)}

try{render()}catch(e){document.getElementById('content').innerHTML='<div style="color:red;padding:20px">エラー: '+e.message+'</div>';console.error(e)}
</script>
</body>
</html>
