<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>株式会社空花 直売チラシ 2ページ目</title>
<style>
  @font-face {
    font-family: "RiiCookieR";
    src: url("fonts/RiiCookieR.otf") format("opentype");
    font-display: swap;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "RiiCookieR", "Yu Mincho", "游明朝", "Hiragino Mincho ProN", serif;
    background: #ede4d0;
    padding: 20px;
    min-height: 100vh;
  }

  /* ヘッダーボタン */
  .toolbar {
    max-width: 1232px;
    margin: 0 auto 16px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .toolbar button {
    background: #8b6914;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    font-family: sans-serif;
  }
  .toolbar button:hover { background: #a07d20; }
  .toolbar button.secondary { background: #6b5a3e; }
  .toolbar button.danger { background: #a84a3f; }

  /* チラシ本体 */
  .flyer {
    position: relative;
    width: 1232px;
    max-width: 100%;
    aspect-ratio: 1232 / 868;
    margin: 0 auto;
    background: url('images/bg/bg.png') no-repeat center center;
    background-size: 100% 100%;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  /* 編集可能な注意書き欄（下部・左側の空きスペース） */
  .notice {
    position: absolute;
    left: 4.5%;
    bottom: 1%;
    width: 55%;
    font-size: 14px;
    color: #3a2f1f;
    line-height: 1.5;
    padding: 4px 8px;
    border-radius: 4px;
    font-family: "RiiCookieR", "Yu Gothic", "游ゴシック", sans-serif;
  }
  .notice[contenteditable="true"]:focus {
    outline: 2px dashed #8b6914;
    background: rgba(255, 248, 220, 0.8);
  }

  /* 枠の共通スタイル */
  .box {
    position: absolute;
    padding: 18px 22px;
    overflow: hidden;
    border: 1px dashed rgba(255,0,0,0.3); /* DEBUG: bg.png黒線との整合確認用、本番で削除 */
  }

  /* 左上：目玉商品（大枠） x:4.1-44.3%, y:1.7-33.8% */
  .box-top-left { top: 2.3%; left: 4.5%; width: 39.5%; height: 30.5%; }

  /* 左下：野菜ラインナップ（大枠） x:4.1-44.3%, y:33.8-92.1% */
  .box-bottom-left { top: 34.5%; left: 4.5%; width: 39.5%; height: 57%; }

  /* 右上：大特価 x:56.2-96.6%, y:1.7-33.8% */
  .box-top-right { top: 2.3%; left: 56.5%; width: 39.7%; height: 30.5%; }

  /* 右中：おススメ x:56.2-96.6%, y:33.8-63.0% */
  .box-middle-right { top: 34.5%; left: 56.5%; width: 39.7%; height: 28%; }

  /* 右下：柑橘など x:56.2-96.6%, y:63.0-88.8% */
  .box-bottom-right { top: 63.5%; left: 56.5%; width: 39.7%; height: 24.8%; }

  /* 見出しバッジ */
  .badge {
    display: inline-block;
    background: #a84a3f;
    color: #fff8dc;
    padding: 4px 16px;
    border-radius: 4px;
    font-size: 26px;
    font-weight: bold;
    font-family: "RiiCookieR", "Yu Gothic", sans-serif;
    margin-bottom: 4px;
  }
  .badge-subtitle {
    display: inline-block;
    font-size: 18px;
    color: #3a2f1f;
    font-family: "RiiCookieR", "Yu Gothic", sans-serif;
    margin-left: 8px;
    vertical-align: middle;
  }
  .section-title {
    font-size: 24px;
    color: #3a2f1f;
    font-weight: bold;
    font-family: "RiiCookieR", "Yu Gothic", sans-serif;
    margin-bottom: 8px;
    text-align: center;
  }
  .section-title.leaf::before { content: "🌿 "; }
  .section-title.leaf::after { content: " 🌿"; }

  /* 目玉商品レイアウト */
  .hero-product {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 10px;
    height: 100%;
  }
  .hero-text .origin { font-size: 22px; color: #3a2f1f; font-family: "RiiCookieR", "Yu Gothic", sans-serif; }
  .hero-text .name { font-size: 42px; font-weight: bold; color: #3a2f1f; font-family: "RiiCookieR", "Yu Gothic", sans-serif; line-height: 1.1; }
  .hero-text .price { font-size: 32px; color: #6b1818; font-weight: bold; font-family: "RiiCookieR", "Yu Gothic", sans-serif; margin-top: 6px; }
  .hero-img { width: 180px; height: 180px; object-fit: contain; }

  /* 商品リスト */
  .product-list {
    display: grid;
    gap: 4px;
    margin-top: 6px;
  }
  .product-row {
    display: grid;
    grid-template-columns: 48px 1fr auto;
    align-items: center;
    gap: 8px;
    font-family: "RiiCookieR", "Yu Gothic", sans-serif;
    padding: 2px 0;
  }
  .product-row.editing { background: rgba(255, 248, 220, 0.6); border-radius: 4px; }
  .product-row img { width: 44px; height: 44px; object-fit: contain; }
  .product-row .pname { font-size: 20px; color: #3a2f1f; font-weight: bold; }
  .product-row .punit { font-size: 14px; color: #6b5a3e; }
  .product-row .pprice { font-size: 22px; color: #6b1818; font-weight: bold; white-space: nowrap; }
  .product-row .pprice .yen { font-size: 16px; }

  /* 編集モードのアイコン選択ボタン */
  .icon-picker-btn {
    background: none;
    border: 2px dashed #a0906b;
    padding: 2px;
    cursor: pointer;
    width: 48px;
    height: 48px;
    border-radius: 4px;
  }
  .icon-picker-btn img { width: 100%; height: 100%; object-fit: contain; }
  .icon-picker-btn:hover { border-color: #8b6914; background: rgba(255, 248, 220, 0.5); }

  /* 編集用input */
  .edit-input {
    font-family: inherit;
    font-size: inherit;
    font-weight: inherit;
    color: inherit;
    background: rgba(255, 248, 220, 0.9);
    border: 1px solid #c9a05c;
    border-radius: 3px;
    padding: 2px 4px;
    width: 100%;
  }
  .edit-input.small { width: 80px; }

  /* 画像ライブラリモーダル */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal.active { display: flex; }
  .modal-box {
    background: white;
    border-radius: 10px;
    padding: 20px;
    max-width: 900px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    font-family: sans-serif;
  }
  .modal-box h2 { font-size: 20px; color: #3a2f1f; margin-bottom: 12px; }
  .modal-box .search { width: 100%; padding: 8px 12px; border: 1px solid #c9b896; border-radius: 6px; margin-bottom: 14px; font-size: 14px; }
  .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
  .icon-cell { background: #faf7ed; border: 2px solid #e0d8c3; border-radius: 6px; padding: 6px; cursor: pointer; text-align: center; }
  .icon-cell:hover { border-color: #8b6914; background: #fff8e8; }
  .icon-cell img { width: 100%; height: 70px; object-fit: contain; }
  .icon-cell .fn { font-size: 10px; color: #6b5a3e; margin-top: 4px; word-break: break-all; }
  .modal-close { float: right; background: #a84a3f; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; }

  /* 印刷用 */
  @media print {
    body { background: white; padding: 0; }
    .toolbar, .edit-marker { display: none !important; }
    .flyer { box-shadow: none; width: 100%; }
  }

  /* 編集モード時のマーカー */
  .edit-marker {
    position: absolute;
    top: 4px;
    right: 4px;
    background: #8b6914;
    color: white;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: sans-serif;
    display: none;
  }
  body.edit-mode .edit-marker { display: block; }
  body.edit-mode .box { outline: 1px dashed rgba(139, 105, 20, 0.3); }
  body.edit-mode .notice { outline: 1px dashed rgba(139, 105, 20, 0.3); }
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="toggleEditMode()" id="edit-btn">編集モード ON/OFF</button>
  <button class="secondary" onclick="saveData()">保存（JSON書き出し）</button>
  <button class="secondary" onclick="document.getElementById('load-input').click()">読み込み</button>
  <input type="file" id="load-input" accept=".json" style="display:none" onchange="loadData(event)">
  <button class="secondary" onclick="window.print()">印刷 / PDF保存</button>
  <button class="danger" onclick="if(confirm('内容をリセットしますか？')) location.reload()">リセット</button>
</div>

<div class="flyer" id="flyer">

  <!-- 左上：目玉商品 -->
  <div class="box box-top-left" data-section="hero">
    <div class="edit-marker">左上：目玉商品</div>
    <div class="hero-product">
      <div class="hero-text">
        <span class="badge" data-field="hero.badge">大人気！</span>
        <div class="origin" data-field="hero.origin">熊本産</div>
        <div class="name" data-field="hero.name">スイカ<span style="font-size:26px">（熊本）</span></div>
        <div class="price"><span data-field="hero.unit">1玉</span> <span data-field="hero.price">2000</span>円</div>
      </div>
      <img class="hero-img" data-field="hero.image" src="images/products/suika.png" alt="スイカ">
    </div>
  </div>

  <!-- 左下：野菜ラインナップ -->
  <div class="box box-bottom-left" data-section="vegetables">
    <div class="edit-marker">左下：野菜ラインナップ</div>
    <div class="section-title leaf" data-field="vegetables.title">今週の野菜ラインナップ</div>
    <div class="product-list" id="vegetables-list"></div>
  </div>

  <!-- 右上：大特価（いちご） -->
  <div class="box box-top-right" data-section="deal">
    <div class="edit-marker">右上：大特価</div>
    <div style="display:flex; align-items:center; gap:8px; margin-bottom: 8px;">
      <span class="badge" data-field="deal.badge">大特価！</span>
      <span class="badge-subtitle" data-field="deal.subtitle">いちご品種色々<br>早い者勝ち！</span>
    </div>
    <div style="display:grid; grid-template-columns: 1fr auto auto; align-items:center; gap:10px;">
      <img data-field="deal.image" src="images/products/ichigo_red.png" style="width:120px; height:120px; object-fit:contain;" alt="いちご">
      <div style="font-size: 36px; font-weight:bold; color:#3a2f1f; font-family: 'RiiCookieR', 'Yu Gothic', sans-serif;" data-field="deal.name">いちご</div>
      <div style="font-size: 30px; color:#6b1818; font-weight:bold; font-family: 'RiiCookieR', 'Yu Gothic', sans-serif;"><span data-field="deal.price">300</span>円</div>
    </div>
    <div style="font-size: 22px; font-weight:bold; color:#3a2f1f; font-family: 'RiiCookieR', 'Yu Gothic', sans-serif; margin-top:6px; text-align:center;">
      <span data-field="deal.pack">4パック</span> <span style="color:#6b1818;"><span data-field="deal.pack_price">1,000</span>円</span><span style="font-size:16px;">(お得！)</span>
    </div>
  </div>

  <!-- 右中：おススメ果物&トマト -->
  <div class="box box-middle-right" data-section="recommend">
    <div class="edit-marker">右中：おススメ</div>
    <div class="section-title" data-field="recommend.title">おススメ果物＆トマト</div>
    <div class="product-list" id="recommend-list"></div>
  </div>

  <!-- 右下：柑橘 -->
  <div class="box box-bottom-right" data-section="citrus">
    <div class="edit-marker">右下：柑橘など</div>
    <div class="section-title" data-field="citrus.title">柑橘いろいろ</div>
    <div class="product-list" id="citrus-list"></div>
  </div>

  <!-- 編集可能注意書き -->
  <div class="notice" id="notice" contenteditable="false">
    ・いちごは1家族様につき、最大5ケースまで。<br>
    ・業者様と思われる方による大量購入は、禁止とさせていただきます。
  </div>

</div>

<!-- 画像ライブラリモーダル -->
<div class="modal" id="icon-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeIconModal()">閉じる</button>
    <h2>画像を選んでください</h2>
    <input type="text" class="search" id="icon-search" placeholder="ファイル名で検索（例：1755）" oninput="filterIcons()">
    <div class="icon-grid" id="icon-grid"></div>
  </div>
</div>

<script>
// ===== データ定義 =====
const defaultData = {
  hero: {
    badge: "大人気！", origin: "熊本産", name: "スイカ（熊本）",
    unit: "1玉", price: "2000", image: "IMG_1755.png"
  },
  deal: {
    badge: "大特価！", subtitle: "いちご品種色々<br>早い者勝ち！",
    name: "いちご", price: "300", pack: "4パック", pack_price: "1,000",
    image: "IMG_1763.png"
  },
  vegetables: {
    title: "今週の野菜ラインナップ",
    items: [
      {image:"IMG_1731.png", name:"にんにく", unit:"1袋（在庫限り）", price:"100"},
      {image:"IMG_1732.png", name:"玉ねぎ（ひね）", unit:"1袋", price:"100"},
      {image:"IMG_1733.png", name:"人参", unit:"1袋（4本入）", price:"100"},
      {image:"IMG_1734.png", name:"ピーマン", unit:"1袋", price:"100"},
      {image:"IMG_1735.png", name:"ながいも（八戸）", unit:"1袋", price:"200"},
      {image:"IMG_1736.png", name:"さつまいも（八戸）", unit:"1本", price:"100"},
      {image:"IMG_1737.png", name:"シルクスイート", unit:"1箱", price:"500"},
      {image:"IMG_1738.png", name:"筍（タケノコ）S〜L", unit:"各種", price:"早い者勝ち"}
    ]
  },
  recommend: {
    title: "おススメ果物＆トマト",
    items: [
      {image:"IMG_1770.png", name:"メロン", unit:"1玉", price:"300"},
      {image:"IMG_1740.png", name:"中玉トマト（ミディ）", unit:"1パック", price:"200"}
    ]
  },
  citrus: {
    title: "柑橘いろいろ",
    items: [
      {image:"IMG_1780.png", name:"甘夏", unit:"3個", price:"200"},
      {image:"IMG_1781.png", name:"清見オレンジ", unit:"1個", price:"100"},
      {image:"IMG_1782.png", name:"八朔（はっさく）", unit:"1個", price:"100"}
    ]
  },
  notice: "・いちごは1家族様につき、最大5ケースまで。<br>・業者様と思われる方による大量購入は、禁止とさせていただきます。"
};

// 全画像ファイル名リスト（103枚）
const allImages = [
  "IMG_1681.png","IMG_1694.png",
  ...Array.from({length:105}, (_,i)=>1728+i)
    .filter(n => ![1757,1759,1760,1801].includes(n))
    .map(n => `IMG_${n}.png`)
];

let currentData = JSON.parse(JSON.stringify(defaultData));
let editMode = false;
let iconPickerTarget = null; // {type:'hero'/'deal'/'list', section, index}

// ===== 初期化 =====
function init() {
  renderAll();
  setupEditHandlers();
}

function renderAll() {
  renderList('vegetables');
  renderList('recommend');
  renderList('citrus');
  applyFieldValues();
  document.getElementById('notice').innerHTML = currentData.notice;
}

function applyFieldValues() {
  document.querySelectorAll('[data-field]').forEach(el => {
    const path = el.dataset.field.split('.');
    let val = currentData;
    for (const p of path) val = val[p];
    if (el.tagName === 'IMG') {
      el.src = 'images/' + val;
    } else {
      el.innerHTML = val;
    }
  });
}

function renderList(section) {
  const container = document.getElementById(section + '-list');
  container.innerHTML = '';
  currentData[section].items.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'product-row';
    row.innerHTML = `
      <button class="icon-picker-btn" onclick="openIconPicker('list','${section}',${idx})" title="画像を変更">
        <img src="images/${item.image}" alt="">
      </button>
      <div>
        <span class="pname" data-edit="${section}.${idx}.name">${item.name}</span>
        <span class="punit" data-edit="${section}.${idx}.unit">${item.unit}</span>
      </div>
      <div class="pprice"><span data-edit="${section}.${idx}.price">${item.price}</span><span class="yen">円</span></div>
    `;
    container.appendChild(row);
  });
  // 編集モード中なら + ボタンも追加
  if (editMode) {
    const addBtn = document.createElement('button');
    addBtn.textContent = '＋ 商品を追加';
    addBtn.style.cssText = 'background:#8b6914; color:white; border:none; padding:6px; border-radius:4px; cursor:pointer; font-size:14px; margin-top:4px;';
    addBtn.onclick = () => addItem(section);
    container.appendChild(addBtn);
  }
}

function addItem(section) {
  currentData[section].items.push({image:"IMG_1728.png", name:"新商品", unit:"1袋", price:"100"});
  renderList(section);
  setupEditHandlers();
}

function removeItem(section, idx) {
  if (!confirm('この商品を削除しますか？')) return;
  currentData[section].items.splice(idx, 1);
  renderList(section);
  setupEditHandlers();
}

// ===== 編集モード =====
function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  document.getElementById('notice').contentEditable = editMode;
  document.getElementById('edit-btn').style.background = editMode ? '#a84a3f' : '#8b6914';
  document.getElementById('edit-btn').textContent = editMode ? '編集モード終了' : '編集モード ON/OFF';
  renderList('vegetables');
  renderList('recommend');
  renderList('citrus');
  setupEditHandlers();
}

function setupEditHandlers() {
  // data-fieldクリックで編集
  document.querySelectorAll('[data-field]').forEach(el => {
    if (el.tagName === 'IMG') {
      el.onclick = () => {
        if (!editMode) return;
        const section = el.dataset.field.split('.')[0];
        openIconPicker('single', section, el.dataset.field);
      };
      el.style.cursor = editMode ? 'pointer' : '';
      if (editMode) el.title = 'クリックして画像変更';
    } else {
      el.onclick = () => {
        if (!editMode) return;
        editTextField(el);
      };
      el.style.cursor = editMode ? 'text' : '';
    }
  });

  // data-editクリックで編集（リスト内）
  document.querySelectorAll('[data-edit]').forEach(el => {
    el.onclick = (e) => {
      if (!editMode) return;
      e.stopPropagation();
      editListField(el);
    };
    el.style.cursor = editMode ? 'text' : '';
  });

  // 削除ボタン（編集モード中のリスト行に追加）
  if (editMode) {
    document.querySelectorAll('.product-row').forEach((row, idx) => {
      if (row.querySelector('.delete-btn')) return;
      const section = row.parentElement.id.replace('-list','');
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '✕';
      delBtn.style.cssText = 'position:absolute; right:-24px; top:50%; transform:translateY(-50%); background:#a84a3f; color:white; border:none; width:20px; height:20px; border-radius:50%; cursor:pointer; font-size:12px;';
      delBtn.onclick = (e) => { e.stopPropagation(); removeItem(section, idx); };
      row.style.position = 'relative';
      row.appendChild(delBtn);
    });
  }

  document.getElementById('notice').contentEditable = editMode;
  document.getElementById('notice').oninput = (e) => {
    currentData.notice = e.target.innerHTML;
  };
}

function editTextField(el) {
  const oldVal = el.innerHTML;
  const newVal = prompt('新しい値を入力してください:', el.textContent);
  if (newVal === null) return;
  const path = el.dataset.field.split('.');
  let obj = currentData;
  for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
  obj[path[path.length - 1]] = newVal;
  applyFieldValues();
  setupEditHandlers();
}

function editListField(el) {
  const [section, idx, field] = el.dataset.edit.split('.');
  const current = currentData[section].items[idx][field];
  const newVal = prompt(`新しい${field}を入力:`, current);
  if (newVal === null) return;
  currentData[section].items[idx][field] = newVal;
  renderList(section);
  setupEditHandlers();
}

// ===== 画像ライブラリ =====
function openIconPicker(type, section, indexOrField) {
  iconPickerTarget = {type, section, indexOrField};
  const grid = document.getElementById('icon-grid');
  grid.innerHTML = '';
  allImages.forEach(fn => {
    const cell = document.createElement('div');
    cell.className = 'icon-cell';
    cell.dataset.name = fn;
    cell.innerHTML = `<img src="images/${fn}" loading="lazy"><div class="fn">${fn.replace('.png','').replace('IMG_','')}</div>`;
    cell.onclick = () => selectIcon(fn);
    grid.appendChild(cell);
  });
  document.getElementById('icon-modal').classList.add('active');
  document.getElementById('icon-search').value = '';
  document.getElementById('icon-search').focus();
}

function closeIconModal() {
  document.getElementById('icon-modal').classList.remove('active');
}

function filterIcons() {
  const q = document.getElementById('icon-search').value.toLowerCase();
  document.querySelectorAll('.icon-cell').forEach(c => {
    c.style.display = c.dataset.name.toLowerCase().includes(q) ? '' : 'none';
  });
}

function selectIcon(fn) {
  const {type, section, indexOrField} = iconPickerTarget;
  if (type === 'list') {
    currentData[section].items[indexOrField].image = fn;
    renderList(section);
    setupEditHandlers();
  } else if (type === 'single') {
    const path = indexOrField.split('.');
    let obj = currentData;
    for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
    obj[path[path.length - 1]] = fn;
    applyFieldValues();
    setupEditHandlers();
  }
  closeIconModal();
}

// ===== 保存 / 読み込み =====
function saveData() {
  const blob = new Blob([JSON.stringify(currentData, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `flyer2_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function loadData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      currentData = JSON.parse(ev.target.result);
      renderAll();
      setupEditHandlers();
      alert('読み込み完了！');
    } catch(err) {
      alert('読み込みに失敗しました: ' + err.message);
    }
  };
  reader.readAsText(file);
}

init();
</script>
